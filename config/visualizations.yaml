# This file configures how GridInputs, GridSets, and GridValues should be visualized.
# Multiple visualization presets can be defined.
#
# Structure:
#   SystemName:
#     InputName:
#       preset_name:
#         resolution: [res_dim0, res_dim1, res_dim2, ...]  # Visualization sampling resolution
#         slices:  # List of 2D slices to generate
#           - dims: [0, 1]  # Which dimensions to plot (x, y axes)
#             fixed: {2: 0.0}  # Fixed values for other dimensions {dim: value}
#             times: [0.0, 2.5, 5.0, 7.5, 10.0]  # Time points to visualize
#             title: "XY Plane"  # Optional custom title
#
# When using exact grid lookup (interpolate=False, the default), the 'resolution'
# parameter is IGNORED. Instead, the actual cached grid points are used for perfect alignment.
#
# `sweeps` (GridValue only) accepts three modes for selecting the sweep values
# along sweep_dim, in priority order:
#   1) sweep_values: [v1, v2, ...]   — explicit values (snapped to nearest grid point)
#   2) sweep_n: N                    — N evenly-spaced grid points along sweep_dim
#   3) (omit both keys)              — use ALL grid points along sweep_dim

RoverParam:

  default:
    default:
      # 5D state: 0=px, 1=py, 2=θ, 3=λ, 4=v
      resolution: [40, 40, 25, 11, 11]

      # ── parameter sweeps (one figure per sweep, subplots over sweep_values) ──
      sweeps:
        # λ sweep at fixed v=4: 6 evenly-spaced grid points along the λ axis
        - dims: [0, 1]
          sweep_dim: 3
          sweep_n: 6
          fixed: {2: 0.0, 4: 3.0}
          time: 0.0
          title: "Initial BRT (x,y) across λ | heading=0, v=4"

        # v sweep at fixed λ=0.5: ALL grid points along the v axis (omit sweep_*)
        - dims: [0, 1]
          sweep_dim: 4
          fixed: {2: 0.0, 3: 1.0}
          time: 0.0
          title: "Initial BRT (x,y) across v | heading=0, λ=0.5"

        # v sweep at fixed λ=1.0: 5 evenly-spaced grid points
        - dims: [0, 1]
          sweep_dim: 4
          sweep_n: 5
          fixed: {2: 0.0, 3: 1.0}
          time: 0.0
          title: "Initial BRT (x,y) across v | heading=0, λ=1.0"

      # ── single-time slices (full BRT field at given fixed point) ────────────
      # `expand_dim` (priority: expand_values | expand_n | all grid points) generates
      # one slice per grid point along that dim — title gets the actual value appended,
      # so the title and the snapped fixed value can never disagree.
      slices:
        # px-py plane at heading=0, λ=0.5 — one figure per v grid point (5 of them)
        - dims: [0, 1]
          fixed: {2: 0.0, 3: 1.0, 4: 3.0}
          # expand_dim: 4
          # expand_n: 3
          times: [0.0]
          title: "Position (x,y) | heading=0, λ=0.5"

        # # px-py plane at heading=0, v=4 — one figure per λ grid point (5 of them)
        # - dims: [0, 1]
        #   fixed: {2: 0.0, 4: 4.0}
        #   expand_dim: 3
        #   expand_n: 5
        #   times: [0.0]
        #   title: "Position (x,y) | heading=0, v=4"

        # # # 2D parameter plane: λ × v at the rover's likely starting position
        # - dims: [3, 4]
        #   fixed: {0: 2.5, 1: 0.0, 2: 0.0}
        #   times: [0.0]
        #   title: "BRT in (λ, v)-plane | start at (2.5, 0, 0)"

RoverDark:
  
  default:
    default:
      resolution: [100, 100, 100]
      slices:
        - dims: [0, 1]  # x vs y
          fixed: {2: 0.0}  # heading = 0
          times: [1.5]
          title: "Position (x,y) at heading=0"
        - dims: [0, 1]  # x vs y
          fixed: {2: 0.0}  # heading = 0
          times: [2.5]
          title: "Position (x,y) at heading=0"
        - dims: [0, 2]  # x vs heading
          fixed: {1: 0.0}  # y = 0
          times: [1.5]
          title: "Position x vs Heading at y=0"
        - dims: [1, 2]  # y vs heading
          fixed: {0: 0.0}  # x = 0
          times: [1.5]
          title: "Position y vs Heading at x=0"