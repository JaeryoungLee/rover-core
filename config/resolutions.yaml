# Grid and time resolutions for building GridInputs, GridSets, and GridValues.
#
# Structure:
#   SystemName:
#     InputName:              # or 'default'
#       state_resolution: [nx, ny, nz, ...]
#       time_resolution: nt

RoverDark:
  RoverDark_MPC:
    state_resolution: [100, 100, 100]
    time_resolution: 100

  default:
    state_resolution: [100, 100, 100]
    time_resolution: 100

RoverBaseline:
  RoverBaseline_MPC:
    state_resolution: [100, 100, 100]
    time_resolution: 100

  default:
    state_resolution: [100, 100, 100]
    time_resolution: 100

RoverParam:
  # 5D state: [px, py, theta, lambda, v]
  # 5D BRT memory ≈ ∏(state_res) × time × 4 bytes; e.g. [40,40,25,11,11]×101 ≈ 0.5GB
  RoverParam_MPC:
    state_resolution: [40, 40, 40, 11, 11]
    time_resolution: 101

  default:
    state_resolution: [40, 40, 25, 11, 11]
    time_resolution: 101

