# Simulation settings per system.
# CLI flags (--set KEY=VALUE) override values from this file.

RoverBaseline:
  default:
    control: GridInput
    # control_tag: RoverBaseline_MPC
    disturbance: ZeroInput
    uncertainty: OptimalInputFromValue
    uncertainty_tag: RoverBaseline_WorstCase
    dt: 0.01
    fps: 30
    description: "RoverBaseline MPC under Uncertainty"
    initial_states:
      # - [4.00, 0.50, 0.00]
      - [4.35, 1.57, 0.00]
      - [12.14, 1.00, 0.00]
      - [14.30, -1.00, 0.00]
      - [13.89, 3.56, 0.00]
      - [9.00, 2.30, 0.00]
      - [10.00, -4.00, 0.00]
      - [15.00, -3.00, 0.00]
      - [12.00, 0.00, 0.00]
      - [8.00,-2.00, 0.00]

RoverParam:
  default:
    control: GridInput
    # control_tag: RoverParam_MPC
    disturbance: ZeroInput
    uncertainty: OptimalInputFromValue
    uncertainty_tag: RoverParam_WorstCase
    dt: 0.01
    fps: 30
    description: "RoverParam MPC under Uncertainty"
    # 5D state: [px, py, theta, lambda, v]
    # When --sweep-dim is used, the swept dim is overwritten per trajectory;
    # the un-swept lambda/v values stay as defaults from the IC below.
    initial_states:
      # - [2.5, -1.00, 0.00, 0.5, 4.00]   # default λ=0.5, v=4.0
      # - [4.00,  0.50, 0.00, 0.5, 4.00]
      # - [6.00, -0.50, 0.00, 0.5, 4.00]
      # - [12.00, 0.50, 0.00,1.00]
      # - [15.00, 2.00, 0.00,1.00]
      # - [8.00,-2.00, 0.00]
      # - [5.0, -2.5, 0.0, 0.0, 4.0] # zero - case 1
      # - [4.9, 0.6, 0.0, 1.0, 5.0] # zero - case 2
      # - [10.0, -3.7, 0.0, 1.0, 4.0] # moderate - case 3
      # - [2.5, 0.0, 0.0, 1.0, 4.0] # moderate - case 4
      - [15.0, -3.0, 0.08, 1.0, 3.0] # harsh - case 5




RoverDark:
  default:
    control: GridInput
    control_tag: RoverDark_MPC
    disturbance: ZeroInput
    uncertainty: OptimalInputFromValue
    uncertainty_tag: RoverDark_WorstCase
    dt: 0.01
    fps: 30
    description: "RoverDark MPC under Uncertainty"
    initial_states:
      - [4.00, 0.50, 0.00]
      - [4.35, 1.57, 0.00]
      - [12.14, 0.77, 0.00]
      - [14.30, -0.55, 0.00]
      - [13.89, 3.56, 0.00]
      - [9.60, 2.30, 0.00]
      - [10.00, -4.00, 0.00]
      - [15.00, -3.00, 0.00]
      - [10.00, 4.00, 0.00]

RoverLight:
  default:
    control: RoverLight_BRTScheduledLight
    control_grid_value_tag: RoverDark_Recursive
    disturbance: ZeroInput
    uncertainty: RoverLight_WorstCaseUncertaintyFromValue
    uncertainty_grid_value_tag: RoverDark_WorstCase
    dt: 0.01
    fps: 30
    description: "RoverLight with BRT-based light scheduling"
    initial_states:
      - [4.00, 0.50, 0.00, 0.00]
      - [4.35, 1.57, 0.00, 0.00]
      - [12.14, 0.77, 0.00, 0.00]
      - [14.30, -0.55, 0.00, 0.00]
      - [13.89, 3.56, 0.00, 0.00]
      - [9.60, 2.30, 0.00, 0.00]
